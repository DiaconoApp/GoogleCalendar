spring.application.name=demo
logging.level.root=${LOG_LEVEL:WARN}

# Porta do Servidor
server.port=${PORT:8080}

# --- Configuracao do Banco de Dados ---
# Se a variavel DB_URL nao existir, ele usara o H2 por padrao
spring.datasource.url=${DB_URL:jdbc:h2:mem:diacono}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:teste}

# JPA / Hibernate
# O Dialeto tambam precisa mudar se voce trocar de H2 para MariaDB
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Console H2 (So funcionara se o banco for H2)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Configuraces do RabbitMQ ---
spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USER:guest}
spring.rabbitmq.password=${RABBIT_PASS:guest}

mq.queue.evento=diacono.evento.queue
mq.exchange.evento=diacono.evento.exchange
mq.routing-key.evento=diacono.evento.rk

# --- Configuracoes do Google Auth ---
# Sem valor padrao para nao subir credenciais no Git
client.id.google=${GOOGLE_CLIENT_ID:}
client.secret.google=   ${GOOGLE_CLIENT_SECRET:}