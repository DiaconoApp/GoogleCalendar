spring.application.name=demo

# Banco H2 em mem�ria
spring.datasource.url=jdbc:h2:mem:diacono
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=teste

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Console H2 (pra debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Configura��es do RabbitMQ (Customizadas) ---
mq.queue.evento=fila.eventos.google
mq.exchange.evento=ex.eventos.google
mq.routing-key.evento=evento.google.key

# --- Configura��es do Google Auth ---
# Obtenha estas credenciais no Google Cloud Console
client.id.google=
client.secret.google=