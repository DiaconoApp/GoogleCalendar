name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    # Definimos outputs para o próximo job conseguir ler a tag gerada
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Gerando o Short SHA
      - name: Set Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Executar Testes
        # Se não houver testes, o Maven apenas avisará e passará com sucesso.
        run: mvn test

      - name: Login no Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Publicamos com 'latest' e com o 'Short SHA' para histórico
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}:${{ steps.vars.outputs.sha_short }}

  notify-dispatch:
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Repository Dispatch
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: ${{ secrets.GITHUB_USERNAME_REPONAME }}
          event-type: worker-image-updated
          # Aqui passamos a tag dinâmica capturada no job anterior
          client-payload: >
            {
              "image": "${{ secrets.DOCKERHUB_REPOSITORY }}",
              "tag": "${{ needs.test-and-build.outputs.image_tag }}"
            }